<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff00a0"/>
    </linearGradient>
    <filter id="glo">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0b0e"/>
  <!-- Neural network graph -->
  <g fill="none" stroke="url(#g)" stroke-width="2" opacity=".4">
    <line x1="20" y1="25" x2="50" y2="20"/>
    <line x1="20" y1="25" x2="35" y2="55"/>
    <line x1="20" y1="25" x2="30" y2="78"/>
    <line x1="50" y1="20" x2="80" y2="30"/>
    <line x1="50" y1="20" x2="65" y2="65"/>
    <line x1="35" y1="55" x2="65" y2="65"/>
    <line x1="35" y1="55" x2="50" y2="82"/>
    <line x1="80" y1="30" x2="65" y2="65"/>
    <line x1="30" y1="78" x2="50" y2="82"/>
    <line x1="65" y1="65" x2="75" y2="80"/>
  </g>
  <!-- Nodes -->
  <g fill="url(#g)" filter="url(#glo)">
    <circle cx="20" cy="25" r="5"/>
    <circle cx="50" cy="20" r="5"/>
    <circle cx="80" cy="30" r="5"/>
    <circle cx="35" cy="55" r="5"/>
    <circle cx="65" cy="65" r="5"/>
    <circle cx="30" cy="78" r="4"/>
    <circle cx="50" cy="82" r="4"/>
    <circle cx="75" cy="80" r="4"/>
  </g>
  <!-- Center pulse ring -->
  <circle cx="50" cy="50" r="18" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity=".15">
    <animate attributeName="r" values="18;25;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".15;0;.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#ff00a0" stroke-width="1" opacity=".2">
    <animate attributeName="r" values="10;20;10" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".2;0;.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
